<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每周食谱 · 速写本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <svg class="svg-filters" aria-hidden="true">
    <filter id="sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="app">
    <header class="sketch-header">
      <div class="doodle-pot">~</div>
      <h1>每周食谱</h1>
      <p class="subtitle">速写本 · 每天两顿 · 两人份生鲜清单</p>
    </header>

    <section class="hero sketch-box">
      <div class="stats">
        <div class="stat">
          <span class="stat-num" id="library-count">—</span>
          <span class="stat-label">食谱库</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="meal-count-stat">12</span>
          <span class="stat-label">本周餐次</span>
        </div>
        <div class="stat">
          <span class="stat-num">2</span>
          <span class="stat-label">人份</span>
        </div>
      </div>
      <button id="generate-btn" class="btn-primary sketch-btn">生成本周菜单</button>
      <button id="settings-btn" class="btn-secondary sketch-btn settings-toggle">⚙ 营养 & AI</button>
      <p class="enrich-status" id="enrich-status"></p>
    </section>

    <section id="settings-panel" class="panel sketch-box hidden settings-panel">
      <div class="panel-header">
        <h2>营养设定 & AI 完善</h2>
        <button id="settings-close" class="btn-secondary sketch-btn">关闭</button>
      </div>
      <p class="profile-desc" id="profile-desc"></p>
      <div class="settings-grid">
        <label>
          OpenAI API Key
          <input type="password" id="api-key" placeholder="sk-..." autocomplete="off" />
        </label>
        <label>
          API 地址（可选）
          <input type="text" id="api-base" placeholder="https://api.openai.com/v1" />
        </label>
      </div>
      <p class="hint">Key 仅保存在本机浏览器，不会上传。兼容 OpenAI 格式的 API。</p>
      <div class="settings-actions">
        <button id="save-settings-btn" class="btn-secondary sketch-btn">保存设置</button>
        <button id="enrich-steps-btn" class="btn-primary sketch-btn">AI 生成简易做法</button>
        <button id="export-recipes-btn" class="btn-secondary sketch-btn">导出 recipes.json</button>
        <button id="reset-recipes-btn" class="btn-secondary sketch-btn">清除本地缓存</button>
      </div>
      <p id="enrich-progress" class="enrich-progress hidden"></p>
    </section>

    <div id="empty-state" class="empty">
      <p id="empty-meal-title">点一下，随机抽 12 道菜</p>
      <p class="empty-note" id="empty-meal-note">6 天 × 午饭 + 晚饭</p>
      <button id="restore-menu-btn" class="btn-secondary sketch-btn restore-menu-btn hidden">回到最近生成的菜单</button>
      <p id="restore-menu-hint" class="empty-note hidden"></p>
    </div>

    <div id="results" class="hidden">
      <section class="panel sketch-box">
        <div class="panel-header">
          <h2>本周菜单</h2>
          <div class="actions">
            <button id="select-all-btn" class="btn-secondary sketch-btn">全选</button>
            <button id="select-none-btn" class="btn-secondary sketch-btn">全不选</button>
            <button id="share-btn" class="btn-secondary sketch-btn">分享菜单</button>
            <button id="copy-btn" class="btn-secondary sketch-btn">复制清单</button>
            <button id="print-btn" class="btn-secondary sketch-btn">打印</button>
          </div>
        </div>
        <p class="hint">勾选想做的餐 · 菜名旁会显示你的头像 · 分享后别人不能选已被占的餐 · 已选 <span id="selected-meal-count">0</span> / <span id="total-meal-count">12</span> 餐 · 你是 <span id="my-person-emoji" aria-hidden="true"></span></p>
        <div id="meals-list" class="meals-grid"></div>
      </section>

      <section class="panel sketch-box">
        <h2>生鲜清单 <span class="badge" id="shop-count">0</span></h2>
        <p class="hint">根据上方勾选的餐次生成 · 公制 + 美国常用单位</p>
        <div id="shopping-list" class="shopping-list"></div>
      </section>
    </div>
  </div>

  <div id="generate-modal" class="recipe-modal hidden" role="dialog" aria-modal="true" aria-labelledby="generate-modal-title">
    <div class="recipe-modal-backdrop" id="generate-modal-backdrop"></div>
    <div class="recipe-modal-box sketch-box generate-modal-box">
      <button type="button" id="generate-modal-close" class="recipe-modal-close" aria-label="关闭">×</button>
      <h3 id="generate-modal-title" class="recipe-modal-title">生成本周菜单？</h3>
      <p id="generate-modal-message" class="generate-modal-message"></p>
      <label class="include-sunday-option">
        <input type="checkbox" id="include-sunday" />
        包括周日
      </label>
      <p class="generate-modal-summary" id="generate-modal-summary">6 天 × 午饭 + 晚饭 · 共 12 餐</p>
      <div class="generate-modal-actions">
        <button type="button" id="generate-cancel-btn" class="btn-secondary sketch-btn">取消</button>
        <button type="button" id="generate-confirm-btn" class="btn-primary sketch-btn">生成</button>
      </div>
    </div>
  </div>

  <div id="recipe-modal" class="recipe-modal hidden" role="dialog" aria-modal="true">
    <div class="recipe-modal-backdrop" id="recipe-modal-backdrop"></div>
    <div class="recipe-modal-box sketch-box">
      <button type="button" id="recipe-modal-close" class="recipe-modal-close" aria-label="关闭">×</button>
      <h3 id="recipe-modal-title" class="recipe-modal-title"></h3>
      <p id="recipe-modal-meta" class="recipe-modal-meta"></p>
      <h4 class="recipe-modal-section">食材</h4>
      <ul id="recipe-modal-ingredients" class="recipe-modal-ingredients"></ul>
      <h4 class="recipe-modal-section">做法</h4>
      <ol id="recipe-modal-steps" class="recipe-modal-steps"></ol>
    </div>
  </div>

  <script src="recipes.js"></script>
  <script src="nutrition.js"></script>
  <script src="units.js"></script>
  <script src="ai-enrich.js"></script>
  <script src="app.js"></script>
</body>
</html>
